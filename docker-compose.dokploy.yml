services:
  backend:
    build: ./backend
    container_name: fasting-backend
    restart: unless-stopped
    ports:
      - "8042:8042"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8042/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - fasting-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    container_name: fasting-frontend
    restart: unless-stopped
    ports:
      - "3099:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - fasting-net

networks:
  fasting-net:
    driver: bridge
