services:
  db:
    image: postgres:16-alpine
    container_name: fasting-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: fasting_coach
      POSTGRES_PASSWORD: fasting_local
      POSTGRES_DB: fasting_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fasting-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fasting_coach -d fasting_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: fasting-backend
    restart: unless-stopped
    ports:
      - "8042:8042"
    environment:
      - DATABASE_URL=postgresql://fasting_coach:fasting_local@db:5432/fasting_db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fasting-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    container_name: fasting-frontend
    restart: unless-stopped
    ports:
      - "3099:80"
    depends_on:
      - backend
    networks:
      - fasting-net

volumes:
  postgres_data:

networks:
  fasting-net:
    driver: bridge
